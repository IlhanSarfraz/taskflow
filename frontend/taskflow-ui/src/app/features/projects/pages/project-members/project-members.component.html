<h2>Project Members</h2>

<table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let m of members">
    <td>{{ m.fullName }}</td>
    <td>{{ m.email }}</td>
    <td>{{ m.role }}</td>

    <td>
      <button (click)="remove(m.userId)">
        Remove
      </button>
    </td>
  </tr>
</table>
