<div class="max-w-lg">
  <a
    routerLink="/projects"
    class="inline-flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-6 transition"
  >
    <i class="fa-solid fa-arrow-left"></i>
    Back to projects
  </a>

  <h2 class="text-2xl font-semibold text-white">Edit Project</h2>
  <p class="text-gray-400 mt-1">Update your project details</p>

  <div *ngIf="pageLoading" class="mt-8 space-y-4 animate-pulse">
    <div class="h-12 bg-[#1a1a1a] rounded-lg"></div>
    <div class="h-28 bg-[#1a1a1a] rounded-lg"></div>
    <div class="h-12 bg-[#1a1a1a] rounded-lg"></div>
  </div>

  <p *ngIf="!pageLoading && loadError" class="mt-8 text-red-400 text-sm">
    {{ loadError }}
  </p>

  <form
    *ngIf="!pageLoading && !loadError"
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="mt-6 bg-[#1a1a1a] border border-gray-800 rounded-xl p-5 space-y-4"
  >

    <div>
      <label class="text-sm text-gray-300">Project Name</label>
      <input
        placeholder="Project Name"
        formControlName="name"
        class="w-full mt-2 p-3 rounded-lg bg-[#1e1e1e] text-white outline-none border border-gray-700 focus:border-[#08CB00]"
      />
    </div>

    <div>
      <label class="text-sm text-gray-300">Description</label>
      <textarea
        placeholder="Description"
        formControlName="description"
        rows="4"
        class="w-full mt-2 p-3 rounded-lg bg-[#1e1e1e] text-white outline-none border border-gray-700 focus:border-[#08CB00] resize-none"
      ></textarea>
    </div>

    <button
      type="submit"
      [disabled]="saving || form.invalid"
      class="w-full mt-2 bg-[#08CB00] hover:bg-green-600 text-black font-semibold py-3 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ saving ? 'Updating...' : 'Update Project' }}
    </button>

  </form>
</div>
