@if (alert) {
  <div
    class="fixed top-4 right-4 z-50 w-96 rounded-lg p-4 shadow-lg border"
    [ngClass]="{
      'bg-red-950 border-red-700 text-red-100': alert.type === 'error',
      'bg-[#16240c] border-green-700 text-green-100': alert.type === 'success',
      'bg-[#2a2110] border-amber-700 text-amber-100': alert.type === 'warning'
    }"
  >
    <div class="flex justify-between items-start gap-3">
      <div>
        <h3 class="font-semibold flex items-center gap-2">
          <i
            class="fa-solid"
            [ngClass]="{
              'fa-circle-exclamation': alert.type === 'error',
              'fa-circle-check': alert.type === 'success',
              'fa-triangle-exclamation': alert.type === 'warning'
            }"
          ></i>
          {{ alert.title }}
        </h3>

        <ul *ngIf="alert.messages?.length" class="list-disc ml-5 mt-2 text-sm">
          <li *ngFor="let message of alert.messages">{{ message }}</li>
        </ul>
      </div>

      <button (click)="close()" class="opacity-70 hover:opacity-100">
        ✕
      </button>
    </div>
  </div>
}
