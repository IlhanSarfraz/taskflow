<div class="relative">
  <button
    (click)="toggle()"
    class="relative w-9 h-9 flex items-center justify-center text-gray-400 hover:text-white hover:bg-[#1e1e1e] rounded-lg"
  >
    <i class="fa-regular fa-bell"></i>
    <span
      *ngIf="unreadCount > 0"
      class="absolute -top-1 -right-1 bg-[#08CB00] text-black text-[10px] font-semibold rounded-full w-4 h-4 flex items-center justify-center"
    >
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <div
    *ngIf="open"
    class="absolute right-0 mt-2 w-96 bg-[#161616] border border-gray-700 rounded-xl shadow-xl z-50 max-h-96 overflow-y-auto"
  >
    <div
        class="px-4 py-3 border-b border-gray-800 flex items-center justify-between"
        >
        <span class="text-white font-medium">Notifications</span>

        <button
            (click)="open = false"
            class="w-7 h-7 flex items-center justify-center rounded-md text-gray-400 hover:text-white hover:bg-[#1e1e1e]"
            aria-label="Close notifications"
            >
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div *ngIf="notifications.length === 0" class="px-4 py-6 text-gray-400 text-sm text-center">
      No notifications
    </div>

    <div
    *ngFor="let n of notifications; trackBy: trackByNotificationId"
    class="px-4 py-3 border-b border-gray-800 last:border-b-0"
    [class.bg-[#1c1c1c]]="!n.isRead"
    >
      <p class="text-white text-sm font-medium">{{ n.title }}</p>
      <p class="text-gray-400 text-xs mt-1">{{ n.message }}</p>

        <div *ngIf="isInvite(n) && !n.isRead" class="flex gap-2 mt-2">
        <button
            (click)="accept(n)"
            [disabled]="isProcessing(n)"
            class="bg-[#08CB00] text-black text-xs font-semibold px-3 py-1.5 rounded-md hover:bg-green-600 disabled:opacity-50"
        >
            {{ isAccepting(n) ? 'Accepting...' : 'Accept' }}
        </button>
        <button
            (click)="decline(n)"
            [disabled]="isProcessing(n)"
            class="bg-[#2a2a2a] text-gray-300 text-xs font-semibold px-3 py-1.5 rounded-md hover:bg-[#3a3a3a] disabled:opacity-50"
        >
            {{ isDeclining(n) ? 'Declining...' : 'Decline' }}
        </button>
        </div>

        <button
        *ngIf="!isInvite(n) && !n.isRead"
        (click)="dismiss(n)"
        [disabled]="isProcessing(n)"
        class="text-gray-500 text-xs mt-1 hover:text-gray-300 disabled:opacity-50"
        >
        Mark as read
        </button>
    </div>
  </div>
</div>
