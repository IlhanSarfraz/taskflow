<h2>Boards</h2>

<div *ngIf="loading">
  Loading boards...
</div>

<div *ngIf="!loading && boards.length === 0">
  No boards found for this project.
</div>

<ul *ngIf="!loading && boards.length > 0">
  <li *ngFor="let board of boards">

    {{ board.name }}

    <button (click)="openBoard(board.id)">
        Open Board
    </button>

    </li>
</ul>

<button>
  Create Board
</button>
